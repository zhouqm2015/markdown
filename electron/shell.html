<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 工具集</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #f4f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      user-select: none;
    }
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .bar {
      flex: 0 0 44px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 12px;
      border-bottom: 1px solid #e5e7eb;
      background: #f4f5f7;
      -webkit-app-region: drag;
    }
    .bar button {
      -webkit-app-region: no-drag;
      appearance: none;
      border: 0;
      background: transparent;
      color: #4b5563;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bar button:hover { background: #e8eaed; color: #111827; }
    .bar button.active {
      background: #111827;
      color: #fff;
    }
    webview {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="bar">
      <button type="button" data-page="home" class="active">首页</button>
      <button type="button" data-page="editor">Markdown编辑器</button>
      <button type="button" data-page="wechat">Markdown转公众号</button>
    </nav>
    <webview id="content" src="https://www.zybkpro.top/markdown/" allowpopups></webview>
  </div>
  <script>
    const PAGES = {
      home: 'https://www.zybkpro.top/markdown/',
      editor: 'https://www.zybkpro.top/mdEditor/',
      wechat: 'https://www.zybkpro.top/WeChatFormatter/',
    };
    const TITLES = {
      home: '首页',
      editor: 'Markdown编辑器',
      wechat: 'Markdown转公众号',
    };

    const webview = document.getElementById('content');
    const buttons = [...document.querySelectorAll('button[data-page]')];

    function setActive(page) {
      buttons.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
      document.title = TITLES[page] || 'Markdown 工具集';
    }

    function navigate(page) {
      if (!PAGES[page]) return;
      setActive(page);
      webview.src = PAGES[page];
      window.shellApi?.notifyPage?.(page);
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => navigate(btn.dataset.page));
    });

    window.shellApi?.onNavigate?.((page) => navigate(page));
    window.shellApi?.onReload?.((force) => {
      if (force) webview.reloadIgnoringCache();
      else webview.reload();
    });

    webview.addEventListener('new-window', (e) => {
      const url = e.url || '';
      try {
        if (new URL(url).hostname === 'www.zybkpro.top') {
          webview.src = url;
        }
      } catch (_) { /* ignore */ }
    });
  </script>
</body>
</html>
